# Hardware watchdog: PID 1 pets /dev/watchdog (BCM2712) so a kernel or PID 1
# hang reboots the unit instead of leaving it dead until someone power-cycles
# it in the field. The BCM watchdog hardware maxes out around 15s, so larger
# values would be clamped anyway.
[Manager]
RuntimeWatchdogSec=15
RebootWatchdogSec=2min
